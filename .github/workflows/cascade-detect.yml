name: Cascade Alerts Nightly Detect

# CF-CASCADE-ALERTS (Drew, 2026-07-17). Nightly detection of insider
# cascade signals — moments where a player's graded market is
# outperforming raw. Reads player_trends (populated by the 03:45 job)
# and writes to cascade_events.
#
# Schedule: 04:45 UTC — after player-trends (03:45), multipliers
# (04:15), and grader-outcomes (04:30); before CH ingest (05:15).

on:
  schedule:
    - cron: '45 4 * * *'
  workflow_dispatch:

jobs:
  detect:
    name: Detect cascade events
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1259D9D213E34AE29B2DD54B3E755C4D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5AB8B3DC612348FD9D37DBE28FF40802 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A45CF8552AE94AF68A046FB846E21206 }}

      - name: Detect cascade events
        working-directory: backend
        run: |
          COSMOS_CONNECTION_STRING=$(az webapp config appsettings list \
            --name HobbyIQ3 --resource-group rg-hobbyiq-dev \
            --query "[?name=='COSMOS_CONNECTION_STRING'].value" -o tsv | tr -d '\r\n')
          if [ -z "$COSMOS_CONNECTION_STRING" ]; then
            echo "COSMOS_CONNECTION_STRING empty — cannot detect"
            exit 1
          fi
          COSMOS_CONNECTION_STRING="$COSMOS_CONNECTION_STRING" \
          COSMOS_DATABASE=hobbyiq \
          node scripts/detect-cascade-events.cjs
