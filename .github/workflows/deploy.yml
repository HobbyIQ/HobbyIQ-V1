name: Deploy HobbyIQ Backend

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: HobbyIQ
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build


      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Show Azure account
        run: az account show

      - name: List web apps visible to this login
        run: az webapp list --query "[].{name:name, resourceGroup:resourceGroup, state:state}" -o table

      - name: Deploy to existing Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: HobbyIQ
          package: .
