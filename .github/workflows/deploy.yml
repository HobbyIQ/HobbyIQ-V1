name: LEGACY (disabled) - Deploy HobbyIQ Backend to Azure App Service

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    if: ${{ false }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./hobbyiq-backend
        run: npm ci

      - name: Build backend
        working-directory: ./hobbyiq-backend
        run: npm run build --if-present

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: hobbyiq-andjgvhgfbhfcuhv
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./hobbyiq-backend
