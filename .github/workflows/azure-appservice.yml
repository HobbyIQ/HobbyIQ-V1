# GitHub Actions workflow for deploying HobbyIQ backend to Azure App Service
# Docs: https://docs.microsoft.com/azure/app-service/deploy-github-actions

name: Deploy HobbyIQ Backend to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install --prefix apps/api

      - name: Build project
        run: npm run build --prefix apps/api

      - name: Zip build output
        run: |
          cd apps/api/dist
          zip -r ../../hobbyiq-api.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: apps/hobbyiq-api.zip

      - name: Post-deployment health check
        run: |
          sleep 20
          curl -f https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health
