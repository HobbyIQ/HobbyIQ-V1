name: Personal Prospect Breakout (nightly)

# CF-PERSONAL-PROSPECT-BREAKOUT (Drew, 2026-07-20). Fires an APNS push
# to any user whose HOLDING matches a sub-raw inversion in the pool.
# Uses computeSubRawInversions for detection; intersects with user
# holdings before sending. Rate limits: 1 push per holding per 7d,
# 2 pushes per user per day.
#
# Sport matrix so all 3 sports fire on the nightly cron.

on:
  schedule:
    - cron: "0 12 * * *"   # 8:00AM ET = 12:00 UTC (after grade-arb + sub-raw-scan settle)
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport scope (default baseball)'
        required: false
        type: string
        default: 'baseball'
      dry_run:
        description: 'Dry-run (compute + report, no pushes sent)'
        required: false
        type: choice
        default: 'true'
        options: ['true', 'false']

jobs:
  fire:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        sport: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.sport)) || fromJson('["baseball", "football", "basketball"]') }}

    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1259D9D213E34AE29B2DD54B3E755C4D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5AB8B3DC612348FD9D37DBE28FF40802 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A45CF8552AE94AF68A046FB846E21206 }}

      - name: Guard — ADMIN_API_TOKEN present
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          if [ -z "$ADMIN_API_TOKEN" ]; then
            echo "::error::ADMIN_API_TOKEN secret missing"
            exit 1
          fi
          echo "::add-mask::$ADMIN_API_TOKEN"

      - name: POST personal-prospect-breakout/run
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          SPORT: ${{ matrix.sport }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          BODY=$(jq -nc \
            --arg sport "$SPORT" \
            --argjson dryRun "$DRY_RUN" \
            '{ sport: $sport, dryRun: $dryRun }')
          HTTP=$(curl -sS -w '\n%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $ADMIN_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$BODY" \
            --max-time 900 \
            "https://hobbyiq3-e5a4dgfsdnb5fbha.centralus-01.azurewebsites.net/api/portfolio/admin/personal-prospect-breakout/run" \
            -o response.json) || true
          STATUS=$(echo "$HTTP" | tail -n1)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::personal-prospect-breakout failed: $STATUS"
            cat response.json || true
            exit 1
          fi
          echo "Summary:"
          jq '.summary' response.json

      - name: Upload response
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: personal-prospect-breakout-${{ matrix.sport }}-${{ github.run_id }}
          path: response.json
          retention-days: 14
