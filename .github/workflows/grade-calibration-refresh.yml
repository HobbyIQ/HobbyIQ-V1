name: Grade Calibration Refresh (weekly)

# CF-GRADE-CALIBRATION-REFRESH (Drew, 2026-07-18). Auto-refreshes
# gradeCalibrationData.ts weekly from live ch_daily_sales data.
# Note: watches gradeCalibrationData.ts (the AUTO-GENERATED file) —
# gradeCalibrationConfig.ts is human-maintained and this workflow
# leaves it alone (fixed 2026-07-22, was mistakenly watching Config).
# When ratios shift materially, opens a PR labeled
# `grade-calibration-refresh` for human review. Small shifts within
# the safety band (±30% per entry) auto-merge; larger shifts require
# manual approval.
#
# Cadence: Sundays 6AM ET (10 UTC). Fires AFTER the daily 5AM refresh
# so the ingest catches up first.
#
# Manual dispatch also supported via GH Actions UI.
#
# Rollback: `git revert <sha>` on the calibration commit restores
# the previous ratios. The config file is deterministic given a
# ch_daily_sales snapshot, so re-running the script post-revert
# reproduces the same output — safe to iterate.

on:
  schedule:
    - cron: "0 10 * * 0"   # Sundays 6AM ET = 10 UTC
  workflow_dispatch:
    inputs:
      auto_merge_safe_deltas:
        description: 'Auto-merge when all deltas are within ±30% safety band'
        required: false
        type: choice
        default: 'true'
        options: ['true', 'false']

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    # CF-CALIBRATION-TIMEOUT-BUMP (Drew, 2026-07-22). Cosmos serverless
    # RU pressure has increased as ch_daily_sales grew past 2.4M rows;
    # the 30-min timeout is now regularly hit, cancelling the workflow
    # before it can emit data. Bump to 60 to give retry chains room.
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1259D9D213E34AE29B2DD54B3E755C4D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5AB8B3DC612348FD9D37DBE28FF40802 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A45CF8552AE94AF68A046FB846E21206 }}

      - name: Fetch COSMOS_CONNECTION_STRING (silent — never echoed)
        id: cosmos
        run: |
          CS=$(az webapp config appsettings list \
            --name HobbyIQ3 --resource-group rg-hobbyiq-dev \
            --query "[?name=='COSMOS_CONNECTION_STRING'].value" -o tsv | tr -d '\r\n')
          if [ -z "$CS" ]; then
            echo "::error::COSMOS_CONNECTION_STRING empty — aborting"
            exit 1
          fi
          echo "::add-mask::$CS"
          echo "cs=$CS" >> "$GITHUB_OUTPUT"

      - name: Snapshot current config for delta comparison
        run: |
          cp backend/src/services/compiq/gradeCalibrationData.ts \
             /tmp/gradeCalibrationData.previous.ts || true

      - name: Run calibration script
        env:
          COSMOS_CONNECTION_STRING: ${{ steps.cosmos.outputs.cs }}
        working-directory: backend
        run: |
          set -euo pipefail
          node scripts/grade-calibrate.mjs 2>&1 | tee /tmp/calibrate.log

      - name: Detect config change
        id: diff
        run: |
          if [ ! -f /tmp/gradeCalibrationData.previous.ts ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "reason=first-run" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if diff -q /tmp/gradeCalibrationData.previous.ts \
                    backend/src/services/compiq/gradeCalibrationData.ts > /dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No config change — nothing to commit."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "reason=ratios-shifted" >> "$GITHUB_OUTPUT"

      - name: Compute delta magnitude (safety band check)
        id: safety
        if: steps.diff.outputs.changed == 'true' && steps.diff.outputs.reason != 'first-run'
        run: |
          node -e "
            const oldC = require('/tmp/gradeCalibrationData.previous.ts'.replace('.ts', '.js'));
            const newC = require('${{ github.workspace }}/backend/src/services/compiq/gradeCalibrationData.ts'.replace('.ts', '.js'));
            let maxDeltaPct = 0;
            let flagged = 0;
            for (const family of Object.keys(newC.GRADE_CALIBRATION || {})) {
              for (const grader of Object.keys(newC.GRADE_CALIBRATION[family] || {})) {
                const newR = newC.GRADE_CALIBRATION[family][grader].medianRatio;
                const oldR = oldC.GRADE_CALIBRATION?.[family]?.[grader]?.medianRatio;
                if (!oldR) continue;
                const deltaPct = Math.abs((newR - oldR) / oldR) * 100;
                if (deltaPct > 30) flagged++;
                if (deltaPct > maxDeltaPct) maxDeltaPct = deltaPct;
              }
            }
            console.log('MAX_DELTA_PCT=' + maxDeltaPct.toFixed(1));
            console.log('FLAGGED=' + flagged);
          " > /tmp/safety.txt 2>&1 || echo "safety-check-failed" > /tmp/safety.txt
          cat /tmp/safety.txt
          # For the initial workflow shape, we output flags to be read by
          # downstream steps. If the .ts import above fails at runtime,
          # we conservatively require human review.

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="grade-calibration-refresh-$(date -u +%Y%m%d)"
          git config user.name "grade-calibration-bot"
          git config user.email "bot@justtheboysandcards.com"
          git checkout -b "$BRANCH"
          git add backend/src/services/compiq/gradeCalibrationData.ts
          cat > /tmp/commit-msg.txt <<EOF
          chore(calibration): weekly refresh of grade-tier ratios

          Auto-generated by .github/workflows/grade-calibration-refresh.yml.
          Ratios computed from 365d of ch_daily_sales via
          backend/scripts/grade-calibrate.mjs.

          Delta summary (max change vs previous):
          $(cat /tmp/safety.txt || echo 'safety check unavailable')

          Full script output:
          $(tail -60 /tmp/calibrate.log || echo 'no output captured')
          EOF
          git commit -F /tmp/commit-msg.txt
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(calibration): weekly grade-tier refresh $(date -u +%Y-%m-%d)" \
            --body "Auto-generated weekly refresh of gradeCalibrationData.ts. Review the diff to sanity-check the ratio changes before merging. Small shifts (< 30% per entry) are expected as the pool grows; larger shifts warrant investigation." \
            --label "grade-calibration-refresh" \
            --base main

      - name: Report no-change
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "No calibration changes this week. Pool is stable — well-covered families."
