name: Daily 5AM ET Refresh & Deploy

on:
  schedule:
    # GitHub cron uses UTC. Use both UTC windows and gate by America/New_York time.
    # 9:00 UTC maps to 5:00 AM during EDT.
    - cron: '0 9 * * *'
    # 10:00 UTC maps to 5:00 AM during EST.
    - cron: '0 10 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy-and-refresh:
    name: Build, Deploy & Warm DailyIQ Cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Run only at 5:00 AM America/New_York
        id: et-gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ET_HOUR=$(TZ=America/New_York date +%H)
          # Widen the gate from equality to a 4-hour window to absorb GitHub
          # Actions schedule drift (cron jobs regularly fire 1-3+ hours late).
          # 10# strips leading zeros so bash treats "05" as decimal, not octal.
          if [ "$((10#$ET_HOUR))" -ge 5 ] && [ "$((10#$ET_HOUR))" -le 9 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Current ET hour is $ET_HOUR (within 05-09 window); continuing workflow."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Current ET hour is $ET_HOUR (outside 05-09 window); skipping this UTC trigger."
          fi

      - name: Setup Node.js 24
        if: steps.et-gate.outputs.should_run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # Install all deps (including devDependencies for tsc)
      - name: Install backend dependencies
        if: steps.et-gate.outputs.should_run == 'true'
        working-directory: backend
        run: npm ci

      # Compile TypeScript → dist/
      - name: Build backend
        if: steps.et-gate.outputs.should_run == 'true'
        working-directory: backend
        run: npm run build

      # Save compiled dist before pruning devDeps
      - name: Save compiled dist
        if: steps.et-gate.outputs.should_run == 'true'
        run: cp -r backend/dist /tmp/backend-dist

      # Trim to production deps for the zip (no @types, no devDeps)
      - name: Prune to production dependencies
        if: steps.et-gate.outputs.should_run == 'true'
        working-directory: backend
        run: npm ci --omit=dev

      # Restore compiled dist (pruning deletes node_modules but not dist, this is a safety net)
      - name: Restore compiled dist
        if: steps.et-gate.outputs.should_run == 'true'
        run: cp -r /tmp/backend-dist backend/dist

      # Install archiver at root (needed by zip.js)
      - name: Install root zip dependencies
        if: steps.et-gate.outputs.should_run == 'true'
        run: npm install archiver --no-save

      # Build deploy.zip via project's own zip.js (packages dist/ + node_modules)
      - name: Create deploy.zip
        if: steps.et-gate.outputs.should_run == 'true'
        run: node zip.js

      # Login to Azure using OIDC service principal (more reliable than JSON creds parsing)
      - name: Login to Azure
        if: steps.et-gate.outputs.should_run == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1259D9D213E34AE29B2DD54B3E755C4D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5AB8B3DC612348FD9D37DBE28FF40802 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A45CF8552AE94AF68A046FB846E21206 }}

      - name: Deploy to Azure App Service
        if: steps.et-gate.outputs.should_run == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: HobbyIQ3
          resource-group-name: rg-hobbyiq-dev
          package: deploy.zip

      # azure/webapps-deploy@v3 does not update App Settings, so GIT_SHA and
      # DEPLOYED_AT stay stale after workflow-triggered deploys and /api/health
      # reports the wrong build metadata. Refresh them here so observability
      # reflects what was actually deployed. See issue #83.
      #
      # CF-DAILY-REFRESH-CONSISTENCY (2026-05-24): also refresh GIT_SHA_SHORT
      # and GIT_BRANCH so this workflow matches the quad written by
      # scripts/deploy-with-build-info.ps1. Before this change, the workflow
      # set only GIT_SHA + DEPLOYED_AT, leaving GIT_SHA_SHORT + GIT_BRANCH
      # stale from prior operator-initiated deploys — asymmetric drift
      # discovered during a mid-session investigation.
      - name: Update build metadata App Settings
        if: steps.et-gate.outputs.should_run == 'true'
        run: |
          SHA_SHORT="${GITHUB_SHA:0:7}"
          az webapp config appsettings set \
            --resource-group rg-hobbyiq-dev \
            --name HobbyIQ3 \
            --settings GIT_SHA=${{ github.sha }} GIT_SHA_SHORT=$SHA_SHORT GIT_BRANCH=${{ github.ref_name }} DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --output none

      # Wait for the app to finish restarting before warming cache
      - name: Wait for app restart
        if: steps.et-gate.outputs.should_run == 'true'
        run: sleep 30

      # Hit health check first
      - name: Health check
        if: steps.et-gate.outputs.should_run == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://hobbyiq3-e5a4dgfsdnb5fbha.centralus-01.azurewebsites.net/api/health)
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed ($STATUS) — aborting cache warm"
            exit 1
          fi

      # CF-DAILY-REFRESH-WARM-AUTH (2026-07-11, Drew): CF-FINALIZE
      # (2026-06-03) hard-gated /players/top/* + /brief behind
      # requireSession + requireEntitlement("dailyIQBriefs"), so the
      # pre-existing unauthenticated curl warms started returning 401
      # and silently no-op'd. Cache stayed cold until the first live
      # investor+ user hit the endpoint. Fix: reuse the TIER1_HARNESS_
      # TOKEN bypass in requireSession (auth as synthetic pro_seller
      # harness user) — same pattern as the Tier 1 Production Harness
      # workflow. Token pulled from App Service settings so it never
      # lives in the workflow file. Fail-closed: if the token is empty,
      # the curls still 401 and we log a workflow warning.
      - name: Fetch TIER1_HARNESS_TOKEN for warm auth
        if: steps.et-gate.outputs.should_run == 'true'
        id: harness-token
        run: |
          TOKEN=$(az webapp config appsettings list \
            --name HobbyIQ3 --resource-group rg-hobbyiq-dev \
            --query "[?name=='TIER1_HARNESS_TOKEN'].value" -o tsv | tr -d '\r\n')
          if [ -z "$TOKEN" ]; then
            echo "::warning::TIER1_HARNESS_TOKEN empty from App Service — DailyIQ warms will 401"
          fi
          # Mask so the value never lands in any subsequent step's log.
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # Force a fresh DailyIQ pull from MLB Stats API — pre-warms cache for users
      - name: Warm DailyIQ cache (MLB)
        if: steps.et-gate.outputs.should_run == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-session-id: ${{ steps.harness-token.outputs.token }}" \
            "https://hobbyiq3-e5a4dgfsdnb5fbha.centralus-01.azurewebsites.net/api/dailyiq/players/top/mlb?limit=25&fresh=true")
          echo "MLB warm status: $STATUS"

      - name: Warm DailyIQ cache (MiLB)
        if: steps.et-gate.outputs.should_run == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-session-id: ${{ steps.harness-token.outputs.token }}" \
            "https://hobbyiq3-e5a4dgfsdnb5fbha.centralus-01.azurewebsites.net/api/dailyiq/players/top/milb?limit=25&fresh=true")
          echo "MiLB warm status: $STATUS"

      - name: Warm DailyIQ brief
        if: steps.et-gate.outputs.should_run == 'true'
        run: |
          # ?fresh=true forces buildAndPersistBriefPayload to run and write to
          # Cosmos; without it the route returns the in-memory _briefCache and
          # skips persistence entirely (root cause of issue #80).
          RESPONSE=$(curl -s \
            -H "x-session-id: ${{ steps.harness-token.outputs.token }}" \
            "https://hobbyiq3-e5a4dgfsdnb5fbha.centralus-01.azurewebsites.net/api/dailyiq/brief?fresh=true")
          MLB_COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('mlb',[])))" 2>/dev/null || echo "?")
          MILB_COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('milb',[])))" 2>/dev/null || echo "?")
          echo "Daily brief warmed — MLB: $MLB_COUNT performers, MiLB: $MILB_COUNT performers"

      # CF-NO-NULL-PRICING PR 5 (2026-07-11): refresh era-baselines Cosmos
      # container. Aggregates recent-weighted currentValue + 7-day predicted
      # per (productKey, year, cardClass) from CH sales. Tier 6 fallback
      # reads these for forward-looking pricing baselines when comps at
      # every higher tier are empty. See docs/design/no-null-pricing-
      # architecture.md.
      #
      # Fetches COSMOS_CONNECTION_STRING + CARD_HEDGE_API_KEY from HobbyIQ3
      # App Service settings via the already-authenticated Azure CLI so
      # nothing sensitive lives in the workflow file. Same credential-
      # loading pattern used by ingest-reference.cjs runs.
      - name: Refresh era-baselines
        if: steps.et-gate.outputs.should_run == 'true'
        working-directory: backend
        run: |
          COSMOS_CONNECTION_STRING=$(az webapp config appsettings list \
            --name HobbyIQ3 --resource-group rg-hobbyiq-dev \
            --query "[?name=='COSMOS_CONNECTION_STRING'].value" -o tsv | tr -d '\r\n')
          CARD_HEDGE_API_KEY=$(az webapp config appsettings list \
            --name HobbyIQ3 --resource-group rg-hobbyiq-dev \
            --query "[?name=='CARD_HEDGE_API_KEY'].value" -o tsv | tr -d '\r\n')
          if [ -z "$COSMOS_CONNECTION_STRING" ]; then
            echo "COSMOS_CONNECTION_STRING empty from App Service — skipping era-baselines refresh"
            exit 0
          fi
          COSMOS_CONNECTION_STRING="$COSMOS_CONNECTION_STRING" \
          CARD_HEDGE_API_KEY="$CARD_HEDGE_API_KEY" \
          COSMOS_DATABASE=hobbyiq \
          node scripts/refresh-era-baselines.cjs || true
          echo "era-baselines refresh finished"

      # CF-SMOKE-TEST-CI-GATE (2026-07-11, Drew): post-deploy tier-
      # classification smoke test. Hits /api/compiq/price with 8 cases
      # (1 per tier) and asserts non-null FMV on tiers 1-7. If ANY of
      # the 7 mustNotNull cases returns null, the workflow fails —
      # catches parser gaps + null-FMV regressions (like the 2026-07-11
      # Padparadscha + Panini Origins smoke findings) before the next
      # day. Uses TIER1_HARNESS_TOKEN for auth. Non-blocking on the
      # deploy itself (deploy + warms + era-baselines already ran); this
      # is the post-deploy validation.
      - name: Smoke test pricing tiers
        if: steps.et-gate.outputs.should_run == 'true'
        working-directory: backend
        run: |
          TIER1_HARNESS_TOKEN="${{ steps.harness-token.outputs.token }}" \
          node scripts/smoke-test-pricing-tiers.cjs
