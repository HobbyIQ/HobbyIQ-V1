name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: HobbyIQ
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Prepare clean deploy folder
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r dist deploy/
          cp package.json deploy/
          cp package-lock.json deploy/

      - name: Verify deploy folder contents
        run: |
          echo "Listing deploy folder contents:"
          ls -l deploy
          echo "Listing dist folder in deploy:"
          ls -l deploy/dist
          test -f deploy/package.json
          test -f deploy/package-lock.json
          test -f deploy/dist/server.js

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./deploy



name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: HobbyIQ
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Prepare clean deploy folder
        run: |
          rm -rf deploy
          mkdir deploy
          cp -r dist deploy/
          cp package.json deploy/
          if [ -f package-lock.json ]; then cp package-lock.json deploy/; fi

      - name: Verify deploy folder contents
        run: |
          echo "Listing deploy folder contents:"
          ls -l deploy
          echo "Listing dist folder in deploy:"
          ls -l deploy/dist
          if [ ! -f deploy/package.json ]; then echo "deploy/package.json missing"; exit 1; fi
          if [ ! -f deploy/package-lock.json ]; then echo "deploy/package-lock.json missing"; exit 1; fi
          if [ ! -f deploy/dist/server.js ]; then echo "deploy/dist/server.js missing"; exit 1; fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./deploy
