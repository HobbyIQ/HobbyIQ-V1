name: Deploy HobbyIQ Backend

on:
	push:
		branches:
			- main
	workflow_dispatch:

env:
	AZURE_WEBAPP_NAME: HobbyIQ
	NODE_VERSION: '22'

jobs:
	build-and-deploy:
		runs-on: ubuntu-latest

		steps:
			- name: Checkout code
				uses: actions/checkout@v4

			- name: Setup Node.js
				uses: actions/setup-node@v4
				with:
					node-version: ${{ env.NODE_VERSION }}
					cache: npm

			- name: Install dependencies
				run: npm ci

			- name: Build project
				run: npm run build

			name: Deploy HobbyIQ Backend

			name: Deploy HobbyIQ Backend

					cp package.json deploy/
				push:
					branches:
						- main
				workflow_dispatch:

					cp package-lock.json deploy/
				AZURE_WEBAPP_NAME: HobbyIQ
				NODE_VERSION: "22"


				test:
					runs-on: ubuntu-latest
					steps:
						- run: echo "workflow is valid"
			- name: Verify deploy folder
				run: |
					ls -la deploy
					ls -la deploy/dist
					test -f deploy/package.json
					test -f deploy/package-lock.json
					test -f deploy/dist/server.js

			- name: Azure Login
				uses: azure/login@v2
				with:
					creds: ${{ secrets.AZURE_CREDENTIALS }}

			- name: Deploy to Azure Web App
				uses: azure/webapps-deploy@v3
				with:
					app-name: ${{ env.AZURE_WEBAPP_NAME }}
					package: ./deploy
