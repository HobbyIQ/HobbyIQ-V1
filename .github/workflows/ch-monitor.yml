name: CH Access Tripwire Monitor

# Phase 3a — Card Hedge access tripwire (Option D per
# docs/phase0/phase3a_ch_monitor_scope.md).
#
# Fires once daily at 02:30 UTC (30 min after fn-cardhedge-comps's
# 02:00 UTC nightly run). Reads the 5 active players' cardhedge.json
# blobs from stcompiqfnotgm2 and creates/comments on a GitHub Issue if
# any player's comp_count drops below threshold OR the blob's
# lastModified is older than the staleness window.
#
# Auth: federated identity via user-assigned managed identity
# `ch-monitor-oidc` in rg-hobbyiq-dev, with Storage Blob Data Reader
# on stcompiqfnotgm2.

on:
  schedule:
    - cron: '30 2 * * *'  # 02:30 UTC daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip issue creation; evaluate and log only'
        type: boolean
        default: false

permissions:
  id-token: write    # OIDC federated auth
  contents: read
  issues: write      # incident issues on threshold breach

env:
  STORAGE_ACCOUNT: stcompiqfnotgm2
  CONTAINER: compiq-signals
  COMP_COUNT_THRESHOLD: 10
  STALENESS_THRESHOLD_HOURS: 25
  PLAYERS: 'aaron-judge mike-trout shohei-ohtani juan-soto ronald-acuna-jr'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (federated managed identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CH_MONITOR_CLIENT_ID }}
          tenant-id: ${{ secrets.CH_MONITOR_TENANT_ID }}
          subscription-id: ${{ secrets.CH_MONITOR_SUBSCRIPTION_ID }}

      - name: Evaluate cardhedge.json health for each player
        id: eval
        run: |
          set -euo pipefail
          BREACHES=()
          REPORT_ROWS=""
          NOW_EPOCH=$(date -u +%s)
          STALENESS_SEC=$(( STALENESS_THRESHOLD_HOURS * 3600 ))

          for player in $PLAYERS; do
            blob_name="${player}/cardhedge.json"

            # Read blob content via AAD (no connection string).
            content=$(az storage blob download \
              --account-name "$STORAGE_ACCOUNT" \
              --container-name "$CONTAINER" \
              --name "$blob_name" \
              --file - \
              --auth-mode login \
              --no-progress 2>/dev/null || echo "")

            last_modified=$(az storage blob show \
              --account-name "$STORAGE_ACCOUNT" \
              --container-name "$CONTAINER" \
              --name "$blob_name" \
              --auth-mode login \
              --query "properties.lastModified" \
              -o tsv 2>/dev/null || echo "")

            if [ -z "$content" ] || [ -z "$last_modified" ]; then
              BREACHES+=("$player: blob unreadable or missing")
              REPORT_ROWS+=$'\n'"| $player | UNREADABLE | - | - | ❌ |"
              continue
            fi

            # Tolerate missing comp_count field per W6.3 caleb-bonemer schema note.
            comp_count=$(echo "$content" | jq -r '.comp_count // "null"')

            blob_epoch=$(date -u -d "$last_modified" +%s)
            age_sec=$(( NOW_EPOCH - blob_epoch ))
            age_h=$(( age_sec / 3600 ))

            verdict="OK"
            if [ "$comp_count" = "null" ]; then
              verdict="WARN_MISSING_FIELD"   # do NOT breach (schema may evolve)
            elif [ "$comp_count" -lt "$COMP_COUNT_THRESHOLD" ]; then
              BREACHES+=("$player: comp_count=$comp_count < $COMP_COUNT_THRESHOLD")
              verdict="❌ COMP_COUNT_LOW"
            fi

            if [ "$age_sec" -gt "$STALENESS_SEC" ]; then
              BREACHES+=("$player: staleness=${age_h}h > ${STALENESS_THRESHOLD_HOURS}h")
              verdict="❌ STALE"
            fi

            REPORT_ROWS+=$'\n'"| $player | $comp_count | $last_modified | ${age_h}h | $verdict |"
          done

          echo "## CH Tripwire Evaluation $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo
          echo "| Player | comp_count | last_modified | age | verdict |"
          echo "|---|---:|---|---:|---|"
          echo "$REPORT_ROWS"

          {
            echo "report_table<<EOF_R"
            echo "| Player | comp_count | last_modified | age | verdict |"
            echo "|---|---:|---|---:|---|"
            echo "$REPORT_ROWS"
            echo "EOF_R"
          } >> "$GITHUB_OUTPUT"

          if [ ${#BREACHES[@]} -eq 0 ]; then
            echo "RESULT: all 5 players healthy."
            echo "breach_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "RESULT: ${#BREACHES[@]} breach(es) detected:"
          {
            echo "breach_count=${#BREACHES[@]}"
            echo "breaches<<EOF_B"
            for b in "${BREACHES[@]}"; do echo "- $b"; done
            echo "EOF_B"
          } >> "$GITHUB_OUTPUT"
          for b in "${BREACHES[@]}"; do echo "  - $b"; done

      - name: Create or comment on threshold-breach issue
        if: steps.eval.outputs.breach_count != '0' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "## CH Access Tripwire — threshold breach"
            echo
            echo "**Evaluated at (UTC):** $NOW"
            echo "**Workflow run:** $RUN_URL"
            echo
            echo "### Per-player evaluation"
            echo
            cat <<'EOF_REPORT'
          ${{ steps.eval.outputs.report_table }}
          EOF_REPORT
            echo
            echo "### Breaches"
            echo
            cat <<'EOF_BREACH'
          ${{ steps.eval.outputs.breaches }}
          EOF_BREACH
            echo
            echo "### Context"
            echo
            echo "- Threshold: comp_count < $COMP_COUNT_THRESHOLD OR lastModified > ${STALENESS_THRESHOLD_HOURS}h"
            echo "- Source function: fn-cardhedge-comps (cron \`0 0 2 * * *\`)"
            echo "- Source blob path: $STORAGE_ACCOUNT/$CONTAINER/{player}/cardhedge.json"
            echo "- Phase 3 cleanup implication: see docs/phase0/finding5_cardhedge_consumer_chain.md"
          } > /tmp/issue_body.md

          # Dedup: append to existing open [CH-MONITOR] issue if present; else create new.
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "[CH-MONITOR] in:title" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Appending breach evaluation to existing issue #$EXISTING"
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/issue_body.md
          else
            echo "Creating new ongoing-incident issue"
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "[CH-MONITOR] CH access degraded — ongoing" \
              --body-file /tmp/issue_body.md
          fi

      - name: Dry-run notice
        if: github.event.inputs.dry_run == 'true'
        run: echo "[DRY_RUN] Skipped issue creation. breach_count=${{ steps.eval.outputs.breach_count }}"
